<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GTA - Gaon To America</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Staatliches&family=Oswald:wght@400;700&display=swap');

        :root {
            --gta-yellow: #fdb124;
            --gta-red: #e81c24;
            --dark-overlay: rgba(0, 0, 0, 0.85);
        }

        body {
            margin: 0;
            padding: 0;
            background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)), 
                        url('https://images.unsplash.com/photo-1514565131-fce0801e5785?q=80&w=2000&auto=format&fit=crop');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            color: white;
            font-family: 'Oswald', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        header {
            text-align: center;
            margin-top: 50px;
            margin-bottom: 40px;
        }

        h1 {
            font-family: 'Staatliches', cursive;
            font-size: 8rem;
            margin: 0;
            line-height: 1;
            text-shadow: 5px 5px 0px var(--gta-red);
            letter-spacing: 10px;
        }

        .subtitle {
            font-size: 2rem;
            color: var(--gta-yellow);
            text-transform: uppercase;
            letter-spacing: 8px;
            margin-top: -10px;
        }

        .level-container {
            width: 90%;
            max-width: 800px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .level-card {
            background: var(--dark-overlay);
            border-left: 10px solid var(--gta-yellow);
            padding: 20px 40px;
            text-decoration: none;
            color: white;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: all 0.4s ease;
            position: relative;
            overflow: hidden;
            cursor: pointer;
        }

        .level-card:hover {
            background: white;
            color: black;
            transform: translateX(20px);
        }

        .level-info h2 {
            margin: 0;
            font-size: 2.5rem;
            text-transform: uppercase;
        }

        .level-info p {
            margin: 0;
            font-size: 1.1rem;
            opacity: 0.8;
            letter-spacing: 2px;
        }

        .level-num {
            font-size: 3rem;
            font-weight: 900;
            opacity: 0.2;
        }

        /* Modal / Question Box Styling */
        #quizOverlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.95);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }

        .quiz-box {
            background: #222;
            padding: 40px;
            border: 4px solid var(--gta-red);
            text-align: center;
            max-width: 400px;
            width: 90%;
        }

        .quiz-box h3 {
            font-size: 1.5rem;
            color: var(--gta-yellow);
            margin-bottom: 20px;
        }

        .quiz-box input {
            width: 100%;
            padding: 15px;
            font-size: 1.2rem;
            background: #333;
            border: none;
            color: white;
            text-align: center;
            margin-bottom: 20px;
            text-transform: uppercase;
        }

        .quiz-box button {
            background: var(--gta-red);
            color: white;
            border: none;
            padding: 15px 30px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
        }

        .quiz-box button:hover {
            background: white;
            color: black;
        }

        @media (max-width: 600px) {
            h1 { font-size: 4rem; }
            .subtitle { font-size: 1rem; }
        }
    </style>
</head>
<body>

    <header>
        <h1>GTA</h1>
        <div class="subtitle">Gaon To America</div>
    </header>

    <div class="level-container">
        <!-- Level 1 -->
        <a href="TempleRun.html" class="level-card">
            <div class="level-info">
                <h2>Level 1: PTSD</h2>
                <p>Pahad to South Delhi</p>
            </div>
            <div class="level-num">01</div>
        </a>

        <!-- Level 2 -->
        <a href="PlaneGame.html" class="level-card">
            <div class="level-info">
                <h2>Level 2: PAP</h2>
                <p>Pakistan Air Petrol Attack!!!</p>
            </div>
            <div class="level-num">02</div>
        </a>

        <!-- Level 3 (Trigger Question) -->
        <div class="level-card" onclick="openQuiz()">
            <div class="level-info">
                <h2>Level 3: United Nonsense</h2>
                <p>Fight! Neo Anti Terrorist Orgn.</p>
            </div>
            <div class="level-num">03</div>
        </div>
    </div>

    <!-- The Quiz Modal -->
    <div id="quizOverlay">
        <div class="quiz-box">
            <h3>Our planet name?</h3>
            <p style="font-size: 0.8rem; margin-bottom: 10px;">Fill in capital</p>
            <input type="text" id="planetInput" placeholder="TYPE HERE...">
            <button onclick="checkAnswer()">CONFIRM ANSWER</button>
            <button onclick="closeQuiz()" style="background:transparent; margin-top: 10px; font-size: 0.8rem;">Cancel</button>
        </div>
    </div>

    <script>
        function openQuiz() {
            document.getElementById('quizOverlay').style.display = 'flex';
        }

        function closeQuiz() {
            document.getElementById('quizOverlay').style.display = 'none';
        }

        function checkAnswer() {
            const answer = document.getElementById('planetInput').value;
            if (answer === "EARTH") {
                window.location.href = "BoatGame.html";
            } else {
                alert("WRONG ANSWER! THINK BIG.");
                document.getElementById('planetInput').value = "";
            }
        }
    </script>

</body>
</html>
