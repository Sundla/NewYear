<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Pahadi Editz · editor's choice </title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0A0C10;
            font-family: 'Inter', sans-serif;
            color: #EDF2F8;
            overflow-x: hidden;
        }

        /* Top navigation like Clideo */
        .top-nav {
            background: #0F1117;
            border-bottom: 1px solid #1F2A3A;
            padding: 12px 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 12px;
        }
        .logo {
            font-size: 1.5rem;
            font-weight: 800;
            background: linear-gradient(135deg, #A855F7, #3B82F6);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .logo i { background: none; color: #A855F7; }
        .top-actions {
            display: flex;
            gap: 12px;
        }
        .btn-outline-light {
            background: transparent;
            border: 1px solid #2D3A4A;
            padding: 6px 16px;
            border-radius: 40px;
            color: #CBD5E1;
            font-weight: 500;
        }

        /* Main container */
        .main-container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px 24px;
        }

        /* Two column layout */
        .editor-layout {
            display: flex;
            flex-wrap: wrap;
            gap: 24px;
        }

        /* Left preview column */
        .preview-col {
            flex: 2;
            min-width: 300px;
        }
        .video-preview-box {
            background: #000000;
            border-radius: 24px;
            overflow: hidden;
            box-shadow: 0 20px 35px -12px rgba(0,0,0,0.6);
            border: 1px solid #262E3A;
        }
        canvas {
            width: 100%;
            height: auto;
            display: block;
            cursor: move;
            background: #000;
        }
        .playback-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 16px;
            gap: 12px;
            flex-wrap: wrap;
        }
        .btn {
            background: #1E293B;
            border: none;
            padding: 8px 20px;
            border-radius: 40px;
            font-weight: 600;
            color: white;
            cursor: pointer;
            font-size: 0.85rem;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            transition: all 0.2s;
        }
        .btn-primary { background: linear-gradient(95deg, #6366F1, #8B5CF6); }
        .btn-success { background: #10B981; }
        .btn-warning { background: #F59E0B; }
        .btn-danger { background: #EF4444; }
        .btn-secondary { background: #2D3A4A; }
        .btn:hover { transform: translateY(-1px); filter: brightness(1.05); }

        /* Timeline section - modern */
        .timeline-panel {
            background: #0F1117;
            border-radius: 24px;
            padding: 20px;
            margin-top: 20px;
            border: 1px solid #1F2A3A;
        }
        .timeline-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 16px;
            font-size: 0.8rem;
            color: #94A3B8;
        }
        .timeline-track-wrapper {
            background: #0A0C10;
            border-radius: 14px;
            padding: 8px 0;
            overflow-x: auto;
        }
        .timeline-track {
            position: relative;
            height: 80px;
            background: #161C24;
            border-radius: 12px;
            cursor: pointer;
        }
        .thumbnails-strip {
            display: flex;
            height: 100%;
            gap: 2px;
        }
        .timeline-marker {
            position: absolute;
            top: 0;
            width: 3px;
            height: 100%;
            background: #FBBF24;
            z-index: 20;
            cursor: ew-resize;
            box-shadow: 0 0 6px #FBBF24;
        }
        .timeline-marker::after {
            content: '▼';
            position: absolute;
            top: -20px;
            left: -6px;
            color: #FBBF24;
            font-size: 12px;
        }
        .trim-overlay-video {
            position: absolute;
            top: 0;
            height: 100%;
            background: rgba(99, 102, 241, 0.3);
            border-left: 3px solid #818CF8;
            border-right: 3px solid #818CF8;
            cursor: grab;
        }
        .trim-handle {
            position: absolute;
            width: 12px;
            height: 100%;
            background: #A5B4FC;
            cursor: ew-resize;
            top: 0;
            border-radius: 4px;
        }
        .trim-left-handle { left: -6px; }
        .trim-right-handle { right: -6px; }

        /* Trim numeric controls - new feature */
        .trim-numeric-panel {
            display: flex;
            gap: 20px;
            margin-top: 16px;
            padding: 12px;
            background: #0A0C10;
            border-radius: 20px;
            justify-content: center;
            flex-wrap: wrap;
        }
        .trim-input-group {
            background: #161C24;
            padding: 8px 16px;
            border-radius: 60px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .trim-input-group label {
            font-size: 0.7rem;
            font-weight: 600;
            color: #94A3B8;
        }
        .trim-input-group input {
            background: #0F1117;
            border: 1px solid #2D3A4A;
            padding: 6px 12px;
            border-radius: 40px;
            width: 80px;
            color: white;
            text-align: center;
            font-family: monospace;
        }

        /* Right tools panel */
        .tools-col {
            flex: 1.2;
            min-width: 280px;
            background: #0F1117;
            border-radius: 28px;
            padding: 22px;
            border: 1px solid #1F2A3A;
            height: fit-content;
        }
        .section-card {
            margin-bottom: 28px;
        }
        .section-title {
            font-weight: 700;
            font-size: 1rem;
            margin-bottom: 14px;
            display: flex;
            align-items: center;
            gap: 8px;
            border-left: 3px solid #8B5CF6;
            padding-left: 12px;
        }
        .text-editor-box {
            background: #0A0C10;
            border-radius: 20px;
            padding: 14px;
        }
        .text-editor-box input, .text-editor-box select {
            width: 100%;
            padding: 10px 14px;
            background: #161C24;
            border: 1px solid #2D3A4A;
            border-radius: 60px;
            color: white;
            margin-top: 6px;
        }
        .flex-row {
            display: flex;
            gap: 10px;
            margin-top: 10px;
        }

        /* Audio section with trim numeric */
        .audio-card {
            background: #0A0C10;
            border-radius: 20px;
            padding: 14px;
        }
        .audio-wave-placeholder {
            background: #161C24;
            height: 56px;
            border-radius: 28px;
            margin: 12px 0;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #5B6E8C;
            font-size: 0.7rem;
        }
        .audio-trim-row {
            display: flex;
            gap: 12px;
            margin: 12px 0;
        }
        .audio-trim-box {
            flex: 1;
            background: #161C24;
            border-radius: 32px;
            padding: 6px 12px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .audio-trim-box span { font-size: 0.7rem; }
        .audio-trim-box input {
            background: #0F1117;
            border: none;
            width: 65px;
            padding: 6px;
            border-radius: 30px;
            text-align: center;
            color: white;
        }
        .volume-slider {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-top: 12px;
        }
        input[type="range"] { flex: 1; }

        .export-btn-large {
            width: 100%;
            background: linear-gradient(95deg, #F97316, #DC2626);
            padding: 14px;
            border-radius: 60px;
            font-weight: 800;
            margin-top: 16px;
            border: none;
            color: white;
        }
        .progress-bar-bg {
            height: 5px;
            background: #2D3A4A;
            border-radius: 5px;
            margin-top: 12px;
            overflow: hidden;
        }
        .progress-fill {
            width: 0%;
            height: 100%;
            background: #F97316;
        }
        .drag-hint {
            font-size: 0.65rem;
            text-align: center;
            color: #6B7A8F;
            margin-top: 8px;
        }
    </style>
</head>
<body>
<div class="top-nav">
    <div class="logo"><i class="fas fa-film"></i> Pahadi Editz <span style="font-size: 0.7rem; background: #1E293B; padding: 4px 8px; border-radius: 30px;">Pro</span></div>
    <div class="top-actions">
        <span class="btn-outline-light"><i class="fas fa-info-circle"></i> Upload and Play</span>
    </div>
</div>

<div class="main-container">
    <div class="editor-layout">
        <!-- LEFT COLUMN : Preview + Timeline -->
        <div class="preview-col">
            <div class="video-preview-box">
                <canvas id="previewCanvas" width="800" height="450"></canvas>
            </div>
            <div class="playback-bar">
                <button id="playPauseBtn" class="btn btn-primary"><i class="fas fa-play"></i> Play</button>
                <label class="btn btn-success" for="videoUploadInput"><i class="fas fa-upload"></i> Upload Video</label>
                <input type="file" id="videoUploadInput" accept="video/*" style="display:none">
                <button id="resetAllTrimBtn" class="btn btn-secondary"><i class="fas fa-undo-alt"></i> Reset</button>
            </div>

            <!-- Advanced Timeline + Numeric Trims -->
            <div class="timeline-panel">
                <div class="timeline-header">
                    <span><i class="fas fa-cut"></i> Timeline & Trim (drag handles)</span>
                    <span class="timecode-badge" id="timecodeDisplay">0.00 / 0.00</span>
                </div>
                <div class="timeline-track-wrapper">
                    <div class="timeline-track" id="timelineTrackDiv">
                        <div class="thumbnails-strip" id="thumbnailStrip"></div>
                        <div class="timeline-marker" id="timelineMarker" style="left: 0%"></div>
                        <div class="trim-overlay-video" id="videoTrimOverlay" style="left:0%; width:100%; display: none;">
                            <div class="trim-handle trim-left-handle" id="trimLeftHandle"></div>
                            <div class="trim-handle trim-right-handle" id="trimRightHandle"></div>
                        </div>
                    </div>
                </div>
                <!-- Numeric trim controls (front & back) -->
                <div class="trim-numeric-panel">
                    <div class="trim-input-group">
                        <label><i class="fas fa-backward-step"></i> TRIM START</label>
                        <input type="number" id="numericTrimStart" step="0.1" value="0.0" placeholder="0.0s">
                        <span>s</span>
                    </div>
                    <div class="trim-input-group">
                        <label><i class="fas fa-forward-step"></i> TRIM END</label>
                        <input type="number" id="numericTrimEnd" step="0.1" value="0.0" placeholder="0.0s">
                        <span>s</span>
                    </div>
                    <button id="applyNumericTrimBtn" class="btn btn-primary" style="padding: 6px 18px;"><i class="fas fa-check"></i> Apply</button>
                </div>
                <div style="display: flex; gap: 10px; margin-top: 8px;">
                    <button id="enableTrimModeBtn" class="btn btn-warning" style="flex:1"><i class="fas fa-scissors"></i> Toggle Trim Handles</button>
                    <button id="commitTrimBtn" class="btn btn-success" style="flex:1"><i class="fas fa-save"></i> Commit Trim</button>
                </div>
            </div>
        </div>

        <!-- RIGHT COLUMN: Text + Audio trim with numbers -->
        <div class="tools-col">
            <!-- TEXT OVERLAY -->
            <div class="section-card">
                <div class="section-title"><i class="fas fa-font"></i> Text Overlay</div>
                <div class="text-editor-box">
                    <input type="text" id="textValue" value="✨ CINEMATIC EDIT ✨">
                    <div class="flex-row">
                        <select id="fontSelect" style="flex:2;">
                            <option value="'Inter', sans-serif">Inter</option>
                            <option value="'Poppins', sans-serif">Poppins</option>
                            <option value="'Dancing Script', cursive">Dancing Script</option>
                            <option value="'Bebas Neue', cursive">Bebas Neue</option>
                        </select>
                        <input type="color" id="textColorInput" value="#FFFFFF">
                        <input type="number" id="fontSizeInput" value="52" min="20" max="110" style="width:75px;">
                    </div>
                    <button id="refreshTextBtn" class="btn btn-primary" style="width:100%; margin-top:12px;"><i class="fas fa-palette"></i> Apply Style</button>
                    <div class="drag-hint"><i class="fas fa-arrows-alt"></i> Drag text directly on preview</div>
                </div>
            </div>

            <!-- AUDIO SECTION with TRIM (front/back numeric) -->
            <div class="section-card">
                <div class="section-title"><i class="fas fa-headphones"></i> Audio Track & Trimmer</div>
                <div class="audio-card">
                    <label class="btn btn-secondary" style="width:100%; justify-content:center; cursor:pointer;" id="audioUploadTrigger">
                        <i class="fas fa-file-audio"></i> Upload MP3 / WAV
                    </label>
                    <input type="file" id="audioFileUpload" accept="audio/*" style="display:none">
                    <div id="audioFileNameStatus" style="font-size:0.7rem; margin: 8px 0; color:#8B9BB0;">No audio loaded</div>
                    <div class="audio-wave-placeholder" id="waveVisual">
                        <i class="fas fa-waveform"></i> audio waveform preview
                    </div>
                    
                    <!-- AUDIO NUMERIC TRIM - front & back as requested -->
                    <div class="audio-trim-row">
                        <div class="audio-trim-box">
                            <span><i class="fas fa-cut"></i> Start</span>
                            <input type="number" id="audioTrimStartSec" step="0.1" value="0.0" placeholder="0.0">
                            <span>s</span>
                        </div>
                        <div class="audio-trim-box">
                            <span><i class="fas fa-cut"></i> End</span>
                            <input type="number" id="audioTrimEndSec" step="0.1" value="0.0" placeholder="0.0">
                            <span>s</span>
                        </div>
                        <button id="applyAudioTrimNumeric" class="btn btn-primary" style="padding: 0 14px;"><i class="fas fa-check"></i></button>
                    </div>
                    
                    <div class="volume-slider">
                        <i class="fas fa-volume-down"></i>
                        <input type="range" id="audioGainSlider" min="0" max="100" value="70">
                        <i class="fas fa-volume-up"></i>
                        <span id="volPercent" style="font-size:0.7rem;">70%</span>
                    </div>
                    <button id="removeAudioTrackBtn" class="btn btn-danger" style="width:100%; margin-top:12px;"><i class="fas fa-trash-alt"></i> Remove Audio</button>
                </div>
            </div>

            <!-- EXPORT BUTTON (Fixed) -->
            <button id="exportFinalVideoBtn" class="export-btn-large"><i class="fas fa-download"></i> EXPORT VIDEO (WebM)</button>
            <div class="progress-bar-bg" id="exportProgressContainer">
                <div class="progress-fill" id="exportProgressFill"></div>
            </div>
        </div>
    </div>
</div>

<script>
    // ---------- DOM Elements ----------
    const canvas = document.getElementById('previewCanvas');
    const ctx = canvas.getContext('2d');
    const videoUpload = document.getElementById('videoUploadInput');
    const playPause = document.getElementById('playPauseBtn');
    const timecodeSpan = document.getElementById('timecodeDisplay');
    const timelineTrack = document.getElementById('timelineTrackDiv');
    const thumbnailStrip = document.getElementById('thumbnailStrip');
    const timelineMarker = document.getElementById('timelineMarker');
    const videoTrimOverlay = document.getElementById('videoTrimOverlay');
    const trimLeft = document.getElementById('trimLeftHandle');
    const trimRight = document.getElementById('trimRightHandle');
    const enableTrimModeBtn = document.getElementById('enableTrimModeBtn');
    const commitTrimBtn = document.getElementById('commitTrimBtn');
    const resetAllTrimBtn = document.getElementById('resetAllTrimBtn');
    const numericTrimStart = document.getElementById('numericTrimStart');
    const numericTrimEnd = document.getElementById('numericTrimEnd');
    const applyNumericTrimBtn = document.getElementById('applyNumericTrimBtn');

    // Text
    const textValue = document.getElementById('textValue');
    const fontSelect = document.getElementById('fontSelect');
    const textColorInput = document.getElementById('textColorInput');
    const fontSizeInput = document.getElementById('fontSizeInput');
    const refreshTextBtn = document.getElementById('refreshTextBtn');

    // Audio
    const audioFileUpload = document.getElementById('audioFileUpload');
    const audioUploadTrigger = document.getElementById('audioUploadTrigger');
    const audioFileNameStatus = document.getElementById('audioFileNameStatus');
    const audioTrimStartSec = document.getElementById('audioTrimStartSec');
    const audioTrimEndSec = document.getElementById('audioTrimEndSec');
    const applyAudioTrimNumeric = document.getElementById('applyAudioTrimNumeric');
    const audioGainSlider = document.getElementById('audioGainSlider');
    const volPercent = document.getElementById('volPercent');
    const removeAudioTrackBtn = document.getElementById('removeAudioTrackBtn');
    const exportBtn = document.getElementById('exportFinalVideoBtn');
    const exportProgressFill = document.getElementById('exportProgressFill');
    const exportProgressContainer = document.getElementById('exportProgressContainer');

    // Video state
    let videoElement = null;
    let videoSrcUrl = null;
    let videoDuration = 0;
    let isPlaying = false;
    let trimEnabled = false;
    let trimStartPercent = 0;
    let trimEndPercent = 100;
    let actualStartSec = 0;
    let actualEndSec = 0;

    // Text overlay state + draggable
    let overlayText = "✨ CINEMATIC EDIT ✨";
    let fontFamily = "'Inter', sans-serif";
    let textColor = "#FFFFFF";
    let fontSize = 52;
    let textXpercent = 50;
    let textYpercent = 50;

    // Audio state with trimming
    let audioCtx = null;
    let rawAudioBuffer = null;
    let trimmedAudioBuffer = null;
    let audioEnabled = false;
    let audioVolume = 0.7;
    let currentAudioSource = null;
    let audioTrimStart = 0;
    let audioTrimEnd = 0;
    let audioOrigDuration = 0;

    // Canvas dimensions
    let canvasWidth = 800, canvasHeight = 450;
    let videoAspect = 16/9;

    // ----- helper: init audio context -----
    async function initAudio() {
        if (!audioCtx) {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        }
        if (audioCtx.state === 'suspended') await audioCtx.resume();
    }

    // ----- load audio with trim later -----
    async function loadAudioFile(file) {
        if (!file) return;
        await initAudio();
        const arrayBuf = await file.arrayBuffer();
        const decoded = await audioCtx.decodeAudioData(arrayBuf);
        rawAudioBuffer = decoded;
        audioOrigDuration = decoded.duration;
        audioTrimStart = 0;
        audioTrimEnd = audioOrigDuration;
        trimmedAudioBuffer = decoded;
        audioEnabled = true;
        audioFileNameStatus.innerHTML = `<i class="fas fa-check-circle"></i> ${file.name} (${audioOrigDuration.toFixed(1)}s)`;
        audioTrimStartSec.value = "0.0";
        audioTrimEndSec.value = audioOrigDuration.toFixed(1);
        updateWaveVisual();
    }

    function updateWaveVisual() {
        const waveDiv = document.getElementById('waveVisual');
        if (trimmedAudioBuffer) {
            waveDiv.innerHTML = `<i class="fas fa-music"></i> trimmed: ${audioTrimStart.toFixed(1)}s → ${audioTrimEnd.toFixed(1)}s`;
        } else {
            waveDiv.innerHTML = `<i class="fas fa-waveform"></i> audio waveform preview`;
        }
    }

    async function applyAudioTrim() {
        if (!rawAudioBuffer) { alert("Upload audio first"); return; }
        let newStart = parseFloat(audioTrimStartSec.value);
        let newEnd = parseFloat(audioTrimEndSec.value);
        if (isNaN(newStart)) newStart = 0;
        if (isNaN(newEnd)) newEnd = audioOrigDuration;
        newStart = Math.max(0, Math.min(newStart, audioOrigDuration - 0.05));
        newEnd = Math.min(audioOrigDuration, Math.max(newStart + 0.1, newEnd));
        audioTrimStart = newStart;
        audioTrimEnd = newEnd;
        const sampleRate = rawAudioBuffer.sampleRate;
        const startSample = Math.floor(audioTrimStart * sampleRate);
        const endSample = Math.floor(audioTrimEnd * sampleRate);
        const length = endSample - startSample;
        const newBuf = audioCtx.createBuffer(rawAudioBuffer.numberOfChannels, length, sampleRate);
        for (let ch = 0; ch < rawAudioBuffer.numberOfChannels; ch++) {
            const oldChan = rawAudioBuffer.getChannelData(ch);
            const newChan = newBuf.getChannelData(ch);
            for (let i = 0; i < length; i++) newChan[i] = oldChan[startSample + i];
        }
        trimmedAudioBuffer = newBuf;
        audioEnabled = true;
        updateWaveVisual();
    }

    function stopAudioPlayback() {
        if (currentAudioSource) {
            try { currentAudioSource.stop(); } catch(e) {}
            currentAudioSource = null;
        }
    }

    function syncAudioWithVideo(currentTime) {
        if (!audioEnabled || !trimmedAudioBuffer || !audioCtx) return;
        stopAudioPlayback();
        const videoRelative = currentTime - actualStartSec;
        const trimmedDuration = audioTrimEnd - audioTrimStart;
        if (trimmedDuration <= 0) return;
        let offset = videoRelative % trimmedDuration;
        if (offset < 0) offset = 0;
        const source = audioCtx.createBufferSource();
        const gain = audioCtx.createGain();
        source.buffer = trimmedAudioBuffer;
        gain.gain.value = audioVolume;
        source.connect(gain);
        gain.connect(audioCtx.destination);
        source.start(0, offset);
        currentAudioSource = source;
        source.onended = () => { if(currentAudioSource === source) currentAudioSource = null; };
    }

    // Video functions
    function createVideo() {
        videoElement = document.createElement('video');
        videoElement.crossOrigin = 'anonymous';
        videoElement.muted = false;
        videoElement.addEventListener('loadedmetadata', onVideoLoaded);
        videoElement.addEventListener('timeupdate', onTimeUpdate);
        videoElement.addEventListener('ended', () => { isPlaying = false; playPause.innerHTML = '<i class="fas fa-play"></i> Play'; stopAudioPlayback(); drawFrame(); });
    }

    function onVideoLoaded() {
        videoDuration = videoElement.duration;
        actualEndSec = videoDuration;
        trimStartPercent = 0; trimEndPercent = 100;
        updateTrimUI();
        const vW = videoElement.videoWidth, vH = videoElement.videoHeight;
        if (vW && vH) { videoAspect = vW/vH; resizeCanvas(); }
        generateThumbnails();
        drawFrame();
        updateTimeDisplay();
        numericTrimStart.value = "0.0";
        numericTrimEnd.value = videoDuration.toFixed(1);
    }
    function resizeCanvas() {
        canvasWidth = Math.min(800, window.innerWidth - 60);
        canvas.height = canvasWidth / videoAspect;
        canvas.width = canvasWidth;
        drawFrame();
    }
    function updateTimeDisplay() {
        if(videoElement) {
            let cur = videoElement.currentTime;
            timecodeSpan.innerText = `${cur.toFixed(2)}s / ${videoDuration.toFixed(2)}s`;
            let progress = (cur - actualStartSec) / (actualEndSec - actualStartSec);
            let percent = Math.max(0, Math.min(100, progress * 100));
            timelineMarker.style.left = percent + '%';
        }
    }
    function onTimeUpdate() {
        if (isPlaying && videoElement.currentTime >= actualEndSec) {
            videoElement.pause();
            isPlaying = false;
            playPause.innerHTML = '<i class="fas fa-play"></i> Play';
            videoElement.currentTime = actualStartSec;
            stopAudioPlayback();
            drawFrame();
        }
        updateTimeDisplay();
        drawFrame();
        if (isPlaying && audioEnabled && trimmedAudioBuffer) {
            if (!currentAudioSource || currentAudioSource?.playbackState === 'ended') {
                syncAudioWithVideo(videoElement.currentTime);
            }
        } else if (!isPlaying) { stopAudioPlayback(); }
    }
    function updateTrimUI() {
        if (trimEnabled) {
            videoTrimOverlay.style.display = 'block';
            videoTrimOverlay.style.left = trimStartPercent + '%';
            videoTrimOverlay.style.width = (trimEndPercent - trimStartPercent) + '%';
        } else { videoTrimOverlay.style.display = 'none'; }
    }
    function commitVideoTrim() {
        actualStartSec = (trimStartPercent / 100) * videoDuration;
        actualEndSec = (trimEndPercent / 100) * videoDuration;
        if (videoElement.currentTime < actualStartSec || videoElement.currentTime > actualEndSec) videoElement.currentTime = actualStartSec;
        updateTimeDisplay();
        drawFrame();
        numericTrimStart.value = actualStartSec.toFixed(1);
        numericTrimEnd.value = actualEndSec.toFixed(1);
    }
    function resetTrim() {
        trimStartPercent = 0; trimEndPercent = 100;
        actualStartSec = 0; actualEndSec = videoDuration;
        updateTrimUI();
        commitVideoTrim();
        if(videoElement) videoElement.currentTime = 0;
        drawFrame();
    }
    function applyNumericTrim() {
        let startVal = parseFloat(numericTrimStart.value);
        let endVal = parseFloat(numericTrimEnd.value);
        if (isNaN(startVal)) startVal = 0;
        if (isNaN(endVal)) endVal = videoDuration;
        startVal = Math.max(0, Math.min(startVal, videoDuration - 0.1));
        endVal = Math.min(videoDuration, Math.max(startVal + 0.1, endVal));
        trimStartPercent = (startVal / videoDuration) * 100;
        trimEndPercent = (endVal / videoDuration) * 100;
        if (trimEnabled) updateTrimUI();
        commitVideoTrim();
    }
    async function generateThumbnails() {
        if (!videoElement || !videoDuration) return;
        thumbnailStrip.innerHTML = '';
        const cnt = 16;
        for (let i = 0; i <= cnt; i++) {
            const time = (i / cnt) * videoDuration;
            const thumbCanvas = document.createElement('canvas');
            thumbCanvas.width = 70; thumbCanvas.height = 45;
            const tCtx = thumbCanvas.getContext('2d');
            const tempVid = document.createElement('video');
            tempVid.src = videoElement.src;
            tempVid.currentTime = time;
            await new Promise(r => { tempVid.onseeked = () => { try { tCtx.drawImage(tempVid, 0, 0, 70, 45); } catch(e){} r(); }; });
            const img = document.createElement('img');
            img.src = thumbCanvas.toDataURL();
            img.style.height = '70px'; img.style.margin = '0 1px'; img.style.borderRadius = '6px';
            thumbnailStrip.appendChild(img);
        }
    }
    function drawFrame() {
        ctx.clearRect(0,0,canvas.width,canvas.height);
        if (videoElement && videoElement.readyState >= 2) {
            const vw = videoElement.videoWidth, vh = videoElement.videoHeight;
            const ratio = Math.min(canvas.width/vw, canvas.height/vh);
            const dw = vw*ratio, dh = vh*ratio, dx = (canvas.width-dw)/2, dy = (canvas.height-dh)/2;
            ctx.drawImage(videoElement, dx, dy, dw, dh);
        } else {
            ctx.fillStyle = '#0A0C10'; ctx.fillRect(0,0,canvas.width,canvas.height);
            ctx.fillStyle = '#bbb'; ctx.fillText("Upload video", canvas.width/2, canvas.height/2);
        }
        if (overlayText.trim()) {
            const x = (textXpercent/100)*canvas.width, y = (textYpercent/100)*canvas.height;
            ctx.font = `${fontSize}px ${fontFamily}`;
            ctx.fillStyle = textColor; ctx.shadowBlur = 6;
            ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
            ctx.fillText(overlayText, x, y);
        }
    }
    // Draggable text
    let dragActive = false;
    canvas.onmousedown = (e) => { dragActive=true; };
    window.onmousemove = (e) => {
        if(!dragActive) return;
        const rect = canvas.getBoundingClientRect();
        const scaleX = canvas.width/rect.width, scaleY=canvas.height/rect.height;
        let mx = (e.clientX - rect.left)*scaleX, my = (e.clientY - rect.top)*scaleY;
        textXpercent = Math.min(100, Math.max(0, (mx/canvas.width)*100));
        textYpercent = Math.min(100, Math.max(0, (my/canvas.height)*100));
        drawFrame();
    };
    window.onmouseup = () => { dragActive=false; };
    
    // Trim handle dragging
    let dragTrim = null;
    trimLeft.onmousedown = (e) => { e.stopPropagation(); dragTrim='left'; };
    trimRight.onmousedown = (e) => { e.stopPropagation(); dragTrim='right'; };
    document.onmousemove = (e) => {
        if(!trimEnabled || !dragTrim) return;
        const rect = timelineTrack.getBoundingClientRect();
        let percent = ((e.clientX - rect.left)/rect.width)*100;
        percent = Math.min(100,Math.max(0,percent));
        if(dragTrim==='left' && percent < trimEndPercent-2) { trimStartPercent=percent; videoTrimOverlay.style.left=trimStartPercent+'%'; videoTrimOverlay.style.width=(trimEndPercent-trimStartPercent)+'%'; }
        if(dragTrim==='right' && percent > trimStartPercent+2) { trimEndPercent=percent; videoTrimOverlay.style.width=(trimEndPercent-trimStartPercent)+'%'; }
    };
    document.onmouseup = () => { dragTrim=null; };
    
    // Export video (working)
    async function exportVideoWithAudio() {
        if(!videoElement || !videoElement.src) return alert("Upload video first");
        exportProgressContainer.style.display = "block";
        exportProgressFill.style.width = "0%";
        const duration = actualEndSec - actualStartSec;
        const stream = canvas.captureStream(30);
        let recorder = new MediaRecorder(stream, { mimeType: 'video/webm' });
        let chunks = [];
        recorder.ondataavailable = (e) => { if(e.data.size) chunks.push(e.data); };
        recorder.onstop = () => {
            const blob = new Blob(chunks, { type: 'video/webm' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a'); a.href = url; a.download = `export_${Date.now()}.webm`; a.click(); URL.revokeObjectURL(url);
            exportProgressFill.style.width = "0%";
            setTimeout(()=>exportProgressContainer.style.display="none", 500);
            stopAudioPlayback();
        };
        recorder.start();
        videoElement.currentTime = actualStartSec;
        await videoElement.play();
        if (audioEnabled && trimmedAudioBuffer) { await initAudio(); syncAudioWithVideo(actualStartSec); }
        let startTime = Date.now();
        let expectedMs = duration * 1000;
        function updateProgress() {
            let elapsed = Date.now() - startTime;
            let percent = Math.min(100, (elapsed/expectedMs)*100);
            exportProgressFill.style.width = percent + '%';
            if(videoElement.currentTime < actualEndSec && !videoElement.paused) requestAnimationFrame(updateProgress);
        }
        updateProgress();
        setTimeout(() => {
            if(recorder.state === 'recording') { videoElement.pause(); recorder.stop(); stopAudioPlayback(); isPlaying=false; playPause.innerHTML='<i class="fas fa-play"></i> Play'; }
        }, expectedMs + 400);
    }

    // Event Bindings
    videoUpload.onchange = (e) => {
        if(videoSrcUrl) URL.revokeObjectURL(videoSrcUrl);
        const file = e.target.files[0];
        if(file) { createVideo(); videoSrcUrl = URL.createObjectURL(file); videoElement.src = videoSrcUrl; videoElement.load(); }
    };
    playPause.onclick = () => {
        if(!videoElement || !videoElement.src) return;
        if(isPlaying) { videoElement.pause(); stopAudioPlayback(); isPlaying=false; playPause.innerHTML='<i class="fas fa-play"></i> Play'; }
        else { videoElement.play(); isPlaying=true; playPause.innerHTML='<i class="fas fa-pause"></i> Pause'; if(audioEnabled && trimmedAudioBuffer) syncAudioWithVideo(videoElement.currentTime); }
        drawFrame();
    };
    enableTrimModeBtn.onclick = () => { trimEnabled = !trimEnabled; updateTrimUI(); enableTrimModeBtn.style.background = trimEnabled ? '#10b981' : '#F59E0B'; };
    commitTrimBtn.onclick = commitVideoTrim;
    resetAllTrimBtn.onclick = resetTrim;
    applyNumericTrimBtn.onclick = applyNumericTrim;
    refreshTextBtn.onclick = () => { overlayText = textValue.value; fontFamily = fontSelect.value; textColor = textColorInput.value; fontSize = parseInt(fontSizeInput.value); drawFrame(); };
    audioUploadTrigger.onclick = () => audioFileUpload.click();
    audioFileUpload.onchange = (e) => { if(e.target.files[0]) loadAudioFile(e.target.files[0]); };
    applyAudioTrimNumeric.onclick = applyAudioTrim;
    removeAudioTrackBtn.onclick = () => { audioEnabled=false; trimmedAudioBuffer=null; stopAudioPlayback(); audioFileNameStatus.innerHTML="No audio loaded"; updateWaveVisual(); };
    audioGainSlider.oninput = () => { audioVolume = audioGainSlider.value/100; volPercent.innerText = audioGainSlider.value+'%'; };
    exportBtn.onclick = exportVideoWithAudio;
    
    createVideo();
    drawFrame();
    window.addEventListener('resize', () => { if(videoElement?.videoWidth) resizeCanvas(); else drawFrame(); });
</script>
</body>
</html>
