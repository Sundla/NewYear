<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Casino - Game Hub</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;700&family=Bungee+Shade&display=swap');

        :root {
            --neon-pink: #e94560;
            --neon-blue: #00d2ff;
            --neon-green: #39ff14;
            --dark-bg: #1a1a2e;
        }

        body {
            margin: 0;
            padding: 0;
            background: radial-gradient(circle at center, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            color: white;
            font-family: 'Poppins', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* --- Header Styling --- */
        header {
            text-align: center;
            padding: 40px 20px;
        }

        h1 {
            font-family: 'Bungee Shade', cursive;
            font-size: clamp(3rem, 10vw, 5rem);
            color: var(--neon-pink);
            text-shadow: 0 0 10px var(--neon-pink), 0 0 20px var(--neon-pink);
            margin: 0;
            letter-spacing: 5px;
            animation: pulse 2s infinite alternate;
        }

        @keyframes pulse {
            from { transform: scale(1); filter: brightness(1); }
            to { transform: scale(1.05); filter: brightness(1.3); }
        }

        /* --- Grid Layout --- */
        .game-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 25px;
            width: 90%;
            max-width: 1100px;
            padding: 20px;
        }

        /* --- Interactive Buttons --- */
        .game-btn {
            background: rgba(255, 255, 255, 0.05);
            border: 2px solid #0f3460;
            border-radius: 15px;
            padding: 40px 20px;
            font-size: 1.3rem;
            font-weight: 700;
            color: white;
            text-decoration: none;
            text-align: center;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            cursor: pointer;
            backdrop-filter: blur(10px);
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            position: relative;
            overflow: hidden;
        }

        .game-btn::after {
            content: 'PLAY NOW';
            position: absolute;
            bottom: -30px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 0.7rem;
            letter-spacing: 2px;
            transition: 0.3s;
            opacity: 0;
        }

        .game-btn:hover {
            transform: translateY(-10px);
            background: rgba(255, 255, 255, 0.1);
        }

        .game-btn:hover::after {
            bottom: 10px;
            opacity: 1;
        }

        /* --- Specific Game Vibes --- */
        .btn-zigzag { border-color: var(--neon-blue); }
        .btn-zigzag:hover { box-shadow: 0 0 25px var(--neon-blue); color: var(--neon-blue); }

        .btn-candy { border-color: #ff00ff; }
        .btn-candy:hover { box-shadow: 0 0 25px #ff00ff; color: #ff00ff; }

        .btn-memory { border-color: var(--neon-green); }
        .btn-memory:hover { box-shadow: 0 0 25px var(--neon-green); color: var(--neon-green); }

        .btn-tank { border-color: #ff8c00; }
        .btn-tank:hover { box-shadow: 0 0 25px #ff8c00; color: #ff8c00; }

        .btn-maze { border-color: #ffff00; }
        .btn-maze:hover { box-shadow: 0 0 25px #ffff00; color: #ffff00; }

        footer {
            margin: 50px 0;
            opacity: 0.5;
            font-size: 0.8rem;
        }
    </style>
</head>
<body>

    <header>
        <h1>CASINO</h1>
        <p>Step into the Digital Arcade</p>
    </header>

    <div class="game-container">
        <!-- ZigZag Puzzle -->
        <a href="ZigZag.html" class="game-btn btn-zigzag">
            ZigZag Puzzle
        </a>

        <!-- Candy Crush -->
        <a href="CandyCrush.html" class="game-btn btn-candy">
            Candy Crush
        </a>

        <!-- Memory Game -->
        <a href="MemoryGame.html" class="game-btn btn-memory">
            Memory Game
        </a>

        <!-- Tank Wars -->
        <a href="TankWars.html" class="game-btn btn-tank">
            Tank Wars
        </a>

        <!-- Maze Game -->
        <a href="MazeGame.html" class="game-btn btn-maze">
            Maze Game
        </a>
    </div>

    <footer>
         Pick Your Fav
    </footer>

    <script>
        // Interactive "Sound" or Vibration effect simulation
        const buttons = document.querySelectorAll('.game-btn');
        
        buttons.forEach(btn => {
            btn.addEventListener('mouseenter', () => {
                // Subtle haptic feedback if supported
                if (window.navigator.vibrate) {
                    window.navigator.vibrate(10);
                }
            });
            
            btn.addEventListener('click', (e) => {
                console.log(`Navigating to: ${btn.getAttribute('href')}`);
                // You could add a transition animation here before redirecting
            });
        });
    </script>
</body>
</html>
